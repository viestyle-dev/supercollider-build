name: "Build SuperCollider (Debian-based ARM Linux: armv7 + arm64)"

on:
  workflow_dispatch:
    inputs:
      sc_version:
        description: "ビルドする SuperCollider のタグ (空なら最新リリースを自動取得)"
        required: false
        default: ""
  schedule:
    # 毎週月曜 03:00 UTC に最新リリースをチェックしてビルド
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Resolve SuperCollider version
        id: version
        env:
          # gh CLI は GITHUB_TOKEN で認証されるため、認証なし curl (60 req/h・共有 IP) の
          # レート制限による 403 を回避できる (認証済みは 5000 req/h)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.sc_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(gh api repos/supercollider/supercollider/releases/latest \
              --jq '.tag_name // empty' || true)
            if [ -z "$VERSION" ]; then
              VERSION=$(gh api --paginate repos/supercollider/supercollider/tags \
                --jq '.[].name' \
                | grep -E '^Version-[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V | tail -n1)
            fi
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::SuperCollider のバージョンを解決できませんでした"
            exit 1
          fi
          echo "Resolved SuperCollider version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="sc-${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "既に $TAG のリリースが存在するためビルドをスキップします"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-armv7:
    needs: resolve-version
    if: needs.resolve-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    env:
      # docker/build-push-action が自動アップロードする *.dockerbuild サマリー artifact を無効化
      # (release ジョブの download-artifact に無関係な artifact が混入するのを防ぐ)
      DOCKER_BUILD_SUMMARY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SuperCollider and export tarball (armv7, QEMU クロスビルド)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          target: release
          build-args: |
            SC_VERSION=${{ needs.resolve-version.outputs.version }}
          outputs: type=local,dest=./dist
          push: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: armv7-tarball
          path: dist/*.tar.gz

  build-arm64:
    needs: resolve-version
    if: needs.resolve-version.outputs.exists == 'false'
    # GitHub がホストするネイティブ arm64 ランナー。Dockerfile.arm64 を Debian ベースでビルドすることで
    # armv7 側と同じ Debian 系ディストリビューション互換のライブラリ構成にする。ネイティブなので QEMU は不要
    # (パブリックリポジトリは無料枠、プライベートリポジトリは課金対象。使えない場合は自前の arm64 self-hosted runner に差し替え)
    runs-on: ubuntu-24.04-arm
    env:
      DOCKER_BUILD_SUMMARY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SuperCollider and export tarball (arm64 ネイティブ Docker ビルド)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.arm64
          platforms: linux/arm64
          target: release
          build-args: |
            SC_VERSION=${{ needs.resolve-version.outputs.version }}
          outputs: type=local,dest=./dist
          push: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64-tarball
          path: dist/*.tar.gz

  release:
    needs: [resolve-version, build-armv7, build-arm64]
    if: needs.resolve-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*-tarball"
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sc-${{ needs.resolve-version.outputs.version }}
          name: "SuperCollider ${{ needs.resolve-version.outputs.version }} (Debian-based ARM Linux: armv7 + arm64)"
          files: dist/*.tar.gz
